services:
  # Backend Web Service
  - type: web
    name: lifeos-ai-backend
    env: node
    buildCommand: npm install && npx prisma generate && npx prisma db push && npm run build && node dist/prisma/seed.js
    startCommand: node dist/backend/src/index.js
    envVars:
      - key: PORT
        value: 5000
      - key: DATABASE_URL
        value: file:./dev.db
      - key: JWT_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production

  # Frontend Static Site
  - type: web
    name: lifeos-ai-frontend
    env: static
    buildCommand: cd frontend && npm install && npm run build
    publishPath: frontend/dist
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: lifeos-ai-backend
          property: host
    routes:
      # Rewrite all routes to index.html to support React Router SPA client routing
      - type: rewrite
        source: /*
        destination: /index.html
