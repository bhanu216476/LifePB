services:
  # ── Full Stack Web Service ──
  - type: web
    name: lifeos-ai-backend
    env: node
    region: oregon
    plan: free
    buildCommand: npm install && cd frontend && npm install && npm run build && cd .. && npx prisma generate
    startCommand: npx prisma db push --skip-generate && npx tsx backend/src/index.ts
    envVars:
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        value: file:./dev.db
      - key: JWT_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production
